<p class="status" *ngIf="loading()">Loading...</p>
<p class="status error" *ngIf="error()">{{ error() }}</p>

<div class="detail" *ngIf="kami() as k">
  <a routerLink="/kami" class="back">← Back to all Kami</a>

  <div class="seal-large">{{ kanjiFor(k.name) }}</div>

  <h1>{{ k.name }}</h1>
  <p class="title">{{ k.title }}</p>

  <div class="divider">◆</div>

  <p class="description">{{ k.description }}</p>

  <div class="facts">
    <div class="fact">
      <span class="label">Domain</span>
      <span class="value">{{ k.domain }}</span>
    </div>
    <div class="fact">
      <span class="label">Symbol</span>
      <span class="value">{{ k.symbol }}</span>
    </div>
    <div class="fact">
      <span class="label">Shrine</span>
      <span class="value">{{ k.shrine }}</span>
    </div>
  </div>

  <div class="myth-section">
    <h2>The Myth</h2>
    <p>{{ k.myth }}</p>
  </div>
</div>
