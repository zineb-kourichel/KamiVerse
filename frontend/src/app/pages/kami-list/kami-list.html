<div class="hero">
  <span class="kanji-bg">神</span>
  <h2>Explore the Kami</h2>
  <p class="subtitle">Spirits of wind, wave, and sun — the pantheon of Shinto</p>
</div>

<p class="status" *ngIf="loading()">Loading...</p>
<p class="status error" *ngIf="error()">{{ error() }}</p>

<div *ngIf="!loading() && !error()" class="kami-grid">
  <div class="kami-card" *ngFor="let kami of kamiList()">
    <img [src]="kami.image_url" [alt]="kami.name" class="kami-img" />
    <div class="seal">{{ kanjiFor(kami.name) }}</div>
    <h3>{{ kami.name }}</h3>
    <p class="title">{{ kami.title }}</p>
    <a [routerLink]="['/kami', kami.id]">View details →</a>
  </div>
</div>
